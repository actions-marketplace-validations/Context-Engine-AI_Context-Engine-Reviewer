name: "Context Engine Reviewer"
description: "AI-powered PR reviews for Context Engine workflows."
author: "Context Engine"
branding:
  icon: "search"
  color: "black"

runs:
  using: "node24"
  main: "dist/main.js"

inputs:
  style_guide_rules:
    required: false
    description: 'Custom style guide rules that will be enforced during review by generating critical comments'
    default: ''
  github_api_url:
    required: false
    description: 'GitHub API URL for GitHub Enterprise Server (e.g., https://github.example.com/api/v3)'
    default: 'https://api.github.com'
  github_server_url:
    required: false
    description: 'GitHub Server URL for GitHub Enterprise Server (e.g., https://github.example.com)'
    default: 'https://github.com'
  custom_mode:
    required: false
    description: 'Enhanced senior engineer review mode: on | off | auto'
    default: 'auto'
  llm_model:
    required: false
    description: 'Override LLM model (e.g., gpt-4o-mini)'
    default: ''
  llm_provider:
    required: false
    description: 'Override LLM provider (e.g., ai-sdk)'
    default: ''
  zai_base_url:
    required: false
    description: 'Z.AI OpenAI-compatible base URL for glm-* models'
    default: 'https://api.z.ai/api/coding/paas/v4/'
  context_engine_api_key:
    required: false
    description: 'Optional Context Engine API key. When set, reviewer LLMs can call Context Engine MCP tools for repository context.'
    default: ''
  context_engine_mcp_url:
    required: false
    description: 'Optional Context Engine MCP indexer URL.'
    default: 'https://dev.context-engine.ai/indexer/mcp'
  context_engine_collection:
    required: false
    description: 'Optional Context Engine collection name to scope reviewer MCP searches.'
    default: ''
  context_engine_tools:
    required: false
    description: 'Optional comma-separated Context Engine MCP tools exposed to the reviewer LLM.'
    default: 'repo_search,batch_search,symbol_graph,batch_symbol_graph,graph_query,batch_graph_query,search_tests_for,search_config_for,search_commits_for'
  context_engine_max_tools:
    required: false
    description: 'Maximum number of Context Engine MCP tools exposed to the reviewer LLM.'
    default: '9'

  review_scopes:
    required: false
    description: 'Comma-separated review scopes to run: security,performance,best-practices'
    default: ''
  max_comments:
    required: false
    description: 'Maximum inline comments to post per run'
    default: '40'
  max_codeblock_lines:
    required: false
    description: 'Maximum lines retained inside fenced code blocks in comments'
    default: '60'
  max_review_chars:
    required: false
    description: 'Approximate maximum diff characters per LLM review batch'
    default: '725000'
  allow_title_update:
    required: false
    description: 'Allow the action to update PR title when @context-engine-reviewer is present (default: false)'
    default: 'false'
